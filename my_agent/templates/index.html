<!DOCTYPE html>
<html lang="zh-CN" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyAgent - 智能多 Agent 任务执行平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/main.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' },
                    }
                }
            },
            safelist: [
                'bg-white', 'shadow-sm', 'font-medium',
                'text-gray-400', 'text-gray-700', 'text-emerald-700',
                'border-cyan-500', 'text-cyan-700', 'bg-cyan-50',
            ]
        }
    </script>
</head>
<body class="h-full bg-gray-50 text-gray-900 flex flex-col">
    <!-- Header -->
    <header class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between flex-shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-primary-600 rounded-lg flex items-center justify-center">
                <span class="text-white font-bold text-sm">A</span>
            </div>
            <h1 class="text-lg font-semibold text-gray-800">MyAgent</h1>
            <span class="text-xs text-gray-400 bg-gray-100 px-2 py-0.5 rounded">v0.1.0</span>
        </div>
        <div class="flex items-center gap-2">
            <a href="/workflow"
               class="flex items-center gap-1.5 text-xs text-gray-600 hover:text-primary-600 hover:bg-primary-50 px-3 py-1.5 rounded-lg transition-colors border border-gray-200 hover:border-primary-300"
               title="工作流编排 — DAG 可视化">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"/>
                </svg>
                工作流
            </a>
            <a href="/evaluation"
               class="flex items-center gap-1.5 text-xs text-gray-600 hover:text-primary-600 hover:bg-primary-50 px-3 py-1.5 rounded-lg transition-colors border border-gray-200 hover:border-primary-300"
               title="Agent 评估中心">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                </svg>
                评估
            </a>
            <a href="/tasks"
               class="flex items-center gap-1.5 text-xs text-gray-600 hover:text-primary-600 hover:bg-primary-50 px-3 py-1.5 rounded-lg transition-colors border border-gray-200 hover:border-primary-300"
               title="异步任务队列">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                </svg>
                任务队列
            </a>
            <a href="/mcp"
               class="flex items-center gap-1.5 text-xs text-gray-600 hover:text-primary-600 hover:bg-primary-50 px-3 py-1.5 rounded-lg transition-colors border border-gray-200 hover:border-primary-300"
               title="MCP 协议管理">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
                </svg>
                MCP
            </a>
            <button id="new-session-btn" 
                    class="text-xs text-gray-600 hover:text-primary-600 hover:bg-primary-50 px-3 py-1.5 rounded-lg transition-colors border border-gray-200 hover:border-primary-300"
                    title="开始新对话">
                ➕ 新对话
            </button>
            <div id="status-indicator" class="flex items-center gap-2 text-sm text-gray-500">
                <span class="w-2 h-2 bg-green-500 rounded-full"></span>
                <span>就绪</span>
            </div>
        </div>
    </header>

    <!-- Chat Area -->
    <main class="flex-1 overflow-hidden flex flex-col max-w-4xl w-full mx-auto">
        <!-- Messages -->
        <div id="messages" class="flex-1 overflow-y-auto px-4 py-6 space-y-6">
            <!-- Welcome message -->
            <div class="text-center py-16">
                <div class="w-16 h-16 bg-primary-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <span class="text-primary-600 text-2xl font-bold">A</span>
                </div>
                <h2 class="text-xl font-semibold text-gray-700 mb-2">欢迎使用 MyAgent</h2>
                <p class="text-gray-500 text-sm max-w-md mx-auto">
                    智能多 Agent 任务执行平台，支持 ReAct 推理、工具调用、多模型路由。
                </p>
            </div>
        </div>

        <!-- Input Area -->
        <div class="border-t border-gray-200 bg-white px-4 py-4 flex-shrink-0">
            <form id="chat-form" class="flex gap-3 items-end max-w-3xl mx-auto">
                <div class="flex-1 relative">
                    <textarea
                        id="user-input"
                        rows="1"
                        placeholder="输入你的问题..."
                        class="w-full resize-none rounded-xl border border-gray-300 px-4 py-3 pr-12
                               text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent
                               placeholder-gray-400 transition-all"
                        style="max-height: 200px"
                    ></textarea>
                </div>
                <button
                    type="submit"
                    id="send-btn"
                    class="bg-primary-600 hover:bg-primary-700 text-white rounded-xl px-5 py-3
                           text-sm font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed
                           flex items-center gap-2 flex-shrink-0"
                >
                    <span>发送</span>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                    </svg>
                </button>
            </form>
            <div class="flex items-center justify-center gap-4 mt-2 flex-wrap">
                <span id="token-usage" class="text-xs text-gray-400"></span>
                <!-- 引擎选择器 -->
                <div class="flex items-center gap-1 bg-gray-100 rounded-lg p-0.5" title="选择底层推理引擎">
                    <button id="engine-self-btn" data-active="true"
                            class="engine-btn text-xs px-2.5 py-1 rounded-md transition-all
                                   bg-white text-gray-700 shadow-sm font-medium">
                        自研引擎
                    </button>
                    <button id="engine-lg-btn" data-active="false"
                            class="engine-btn text-xs px-2.5 py-1 rounded-md transition-all
                                   text-gray-400">
                        LangGraph
                    </button>
                </div>
                <!-- LangGraph 模式选择（仅 LangGraph 引擎开启时显示） -->
                <select id="lg-mode-select"
                        title="选择 LangGraph 运行模式"
                        class="hidden text-xs border border-emerald-300 text-emerald-700 bg-emerald-50 rounded-lg px-2 py-1.5 focus:outline-none focus:ring-1 focus:ring-emerald-400 cursor-pointer">
                    <option value="react">ReAct Agent</option>
                    <option value="plan_execute">Plan-and-Execute</option>
                    <option value="sequential">Sequential 多 Agent</option>
                    <option value="supervisor">Supervisor 多 Agent</option>
                </select>
                <!-- 多 Agent 协作切换 -->
                <div class="flex items-center gap-1.5">
                    <button id="multi-agent-btn"
                            title="开启后使用多 Agent 协作模式，Agent 间通过 Coordinator 路由消息"
                            class="flex items-center gap-1.5 text-xs px-3 py-1.5 rounded-lg border transition-all
                                   border-gray-200 text-gray-500 hover:border-indigo-300 hover:text-indigo-600 hover:bg-indigo-50">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
                        </svg>
                        <span id="multi-agent-text">多 Agent</span>
                    </button>
                    <!-- 场景选择（仅多 Agent 模式开启时显示） -->
                    <select id="scenario-select"
                            title="选择多 Agent 协作场景"
                            class="hidden text-xs border border-indigo-300 text-indigo-700 bg-indigo-50 rounded-lg px-2 py-1.5 focus:outline-none focus:ring-1 focus:ring-indigo-400 cursor-pointer">
                        <option value="research_report">研究报告（顺序）</option>
                        <option value="data_analysis">数据分析（层级）</option>
                    </select>
                </div>
                <!-- 深度思考切换 -->
                <button id="deep-think-btn"
                        title="开启后使用 Plan-and-Execute 引擎，将任务拆解为多步骤执行，适合复杂问题"
                        class="flex items-center gap-1.5 text-xs px-3 py-1.5 rounded-lg border transition-all
                               border-gray-200 text-gray-500 hover:border-violet-300 hover:text-violet-600 hover:bg-violet-50">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.346.346a1 1 0 01-.707.293H9.38a1 1 0 01-.707-.293l-.346-.346z"/>
                    </svg>
                    <span id="deep-think-text">深度思考</span>
                </button>
                <button id="customer-service-btn"
                        title="开启后改为调用客服 Copilot 接口，模拟客服场景下的坐席辅助流程"
                        class="flex items-center gap-1.5 text-xs px-3 py-1.5 rounded-lg border transition-all
                               border-gray-200 text-gray-500 hover:border-cyan-300 hover:text-cyan-600 hover:bg-cyan-50">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-4l-4 4v-4z"/>
                    </svg>
                    <span id="customer-service-text">客服 Copilot</span>
                </button>
                <!-- 流式/非流式切换 -->
                <label class="stream-toggle-label" title="开启后逐字输出，关闭后等待完整响应">
                    <input type="checkbox" id="stream-toggle" checked>
                    <span class="stream-toggle-track">
                        <span class="stream-toggle-thumb"></span>
                    </span>
                    <span class="stream-toggle-text">
                        <span id="stream-mode-text">流式输出</span>
                    </span>
                </label>
            </div>
            <div id="customer-service-panel"
                 class="hidden max-w-3xl mx-auto mt-3 border border-cyan-200 bg-cyan-50 rounded-2xl p-4 space-y-3 shadow-sm">
                <div class="flex items-start justify-between gap-3 flex-wrap">
                    <div>
                        <div class="text-sm font-semibold text-cyan-800">客服场景模拟</div>
                        <p class="text-xs text-cyan-700 mt-1">
                            开启后将请求 <code class="bg-cyan-100 text-cyan-800 px-1.5 py-0.5 rounded">/api/v1/customer-service/copilot</code>，
                            用于演示客服坐席辅助、售后判断和投诉处理流程。
                        </p>
                    </div>
                    <div class="flex items-center gap-2 flex-wrap">
                        <button type="button" data-cs-preset="logistics_delay"
                                class="cs-preset-btn text-xs px-2.5 py-1.5 rounded-lg border border-cyan-200 bg-white text-cyan-700 hover:bg-cyan-100 transition-colors">
                            物流催件
                        </button>
                        <button type="button" data-cs-preset="refund_complaint"
                                class="cs-preset-btn text-xs px-2.5 py-1.5 rounded-lg border border-cyan-200 bg-white text-cyan-700 hover:bg-cyan-100 transition-colors">
                            退款投诉
                        </button>
                        <button type="button" data-cs-preset="after_sales_ticket"
                                class="cs-preset-btn text-xs px-2.5 py-1.5 rounded-lg border border-cyan-200 bg-white text-cyan-700 hover:bg-cyan-100 transition-colors">
                            售后建单
                        </button>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <label class="block">
                        <span class="block text-xs font-medium text-cyan-800 mb-1">客服模式</span>
                        <select id="cs-mode-select"
                                class="w-full rounded-xl border border-cyan-200 bg-white px-3 py-2 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent">
                            <option value="copilot">copilot</option>
                            <option value="read_only">read_only</option>
                            <option value="ticket_draft">ticket_draft</option>
                            <option value="complaint_review">complaint_review</option>
                            <option value="after_sales">after_sales</option>
                            <option value="pre_sales">pre_sales</option>
                        </select>
                    </label>
                    <label class="block">
                        <span class="block text-xs font-medium text-cyan-800 mb-1">渠道</span>
                        <select id="cs-channel-input"
                                class="w-full rounded-xl border border-cyan-200 bg-white px-3 py-2 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent">
                            <option value="whatsapp">whatsapp</option>
                            <option value="facebook">facebook</option>
                            <option value="line">line</option>
                            <option value="email">email</option>
                            <option value="webchat">webchat</option>
                        </select>
                    </label>
                    <label class="block">
                        <span class="block text-xs font-medium text-cyan-800 mb-1">客户 ID</span>
                        <input id="cs-customer-id-input" type="text" placeholder="例如 CUST-10086"
                               class="w-full rounded-xl border border-cyan-200 bg-white px-3 py-2 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent">
                    </label>
                    <label class="block">
                        <span class="block text-xs font-medium text-cyan-800 mb-1">订单 ID</span>
                        <input id="cs-order-id-input" type="text" placeholder="例如 SO-20260403001"
                               class="w-full rounded-xl border border-cyan-200 bg-white px-3 py-2 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent">
                    </label>
                    <label class="block">
                        <span class="block text-xs font-medium text-cyan-800 mb-1">外部客服会话 ID</span>
                        <input id="cs-external-session-input" type="text" placeholder="例如 CS-SESSION-001"
                               class="w-full rounded-xl border border-cyan-200 bg-white px-3 py-2 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent">
                    </label>
                    <label class="block">
                        <span class="block text-xs font-medium text-cyan-800 mb-1">工单 ID</span>
                        <input id="cs-ticket-id-input" type="text" placeholder="例如 TICKET-9001"
                               class="w-full rounded-xl border border-cyan-200 bg-white px-3 py-2 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent">
                    </label>
                    <label class="block">
                        <span class="block text-xs font-medium text-cyan-800 mb-1">客户等级</span>
                        <input id="cs-customer-tier-input" type="text" placeholder="例如 vip / gold"
                               class="w-full rounded-xl border border-cyan-200 bg-white px-3 py-2 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent">
                    </label>
                    <label class="block">
                        <span class="block text-xs font-medium text-cyan-800 mb-1">语言地区</span>
                        <input id="cs-locale-input" type="text" value="zh-CN"
                               class="w-full rounded-xl border border-cyan-200 bg-white px-3 py-2 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent">
                    </label>
                    <label class="block">
                        <span class="block text-xs font-medium text-cyan-800 mb-1">知识域</span>
                        <select id="cs-knowledge-domain-input"
                                class="w-full rounded-xl border border-cyan-200 bg-white px-3 py-2 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent">
                            <option value="faq">faq</option>
                            <option value="sop">sop</option>
                            <option value="policy">policy</option>
                            <option value="ticket">ticket</option>
                            <option value="quality">quality</option>
                            <option value="product">product</option>
                        </select>
                    </label>
                    <label class="block">
                        <span class="block text-xs font-medium text-cyan-800 mb-1">业务标签</span>
                        <input id="cs-tags-input" type="text" placeholder="逗号分隔，例如 logistics, delay, vip"
                               class="w-full rounded-xl border border-cyan-200 bg-white px-3 py-2 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent">
                    </label>
                </div>

                <div class="flex items-center gap-4 flex-wrap">
                    <label class="inline-flex items-center gap-2 text-xs text-cyan-800">
                        <input id="cs-allow-write-toggle" type="checkbox" class="rounded border-cyan-300 text-cyan-600 focus:ring-cyan-500">
                        <span>允许进入写操作审批流</span>
                    </label>
                    <label class="inline-flex items-center gap-2 text-xs text-cyan-800">
                        <input id="cs-approval-before-answer-toggle" type="checkbox" class="rounded border-cyan-300 text-cyan-600 focus:ring-cyan-500">
                        <span>最终答复前审批</span>
                    </label>
                    <span class="text-xs text-cyan-700">
                        提示：`ticket_draft`、`complaint_review` 或开启写操作时，可能触发审批暂停事件。
                    </span>
                </div>
            </div>
        </div>
    </main>

    <script src="/static/js/chat.js"></script>
</body>
</html>
