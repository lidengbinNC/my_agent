<!DOCTYPE html>
<html lang="zh-CN" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyAgent - 智能多 Agent 任务执行平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/main.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' },
                    }
                }
            }
        }
    </script>
</head>
<body class="h-full bg-gray-50 text-gray-900 flex flex-col">
    <!-- Header -->
    <header class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between flex-shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-primary-600 rounded-lg flex items-center justify-center">
                <span class="text-white font-bold text-sm">A</span>
            </div>
            <h1 class="text-lg font-semibold text-gray-800">MyAgent</h1>
            <span class="text-xs text-gray-400 bg-gray-100 px-2 py-0.5 rounded">v0.1.0</span>
        </div>
        <div class="flex items-center gap-4">
            <button id="new-session-btn" 
                    class="text-xs text-gray-600 hover:text-primary-600 hover:bg-primary-50 px-3 py-1.5 rounded-lg transition-colors border border-gray-200 hover:border-primary-300"
                    title="开始新对话">
                ➕ 新对话
            </button>
            <div id="status-indicator" class="flex items-center gap-2 text-sm text-gray-500">
                <span class="w-2 h-2 bg-green-500 rounded-full"></span>
                <span>就绪</span>
            </div>
        </div>
    </header>

    <!-- Chat Area -->
    <main class="flex-1 overflow-hidden flex flex-col max-w-4xl w-full mx-auto">
        <!-- Messages -->
        <div id="messages" class="flex-1 overflow-y-auto px-4 py-6 space-y-6">
            <!-- Welcome message -->
            <div class="text-center py-16">
                <div class="w-16 h-16 bg-primary-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <span class="text-primary-600 text-2xl font-bold">A</span>
                </div>
                <h2 class="text-xl font-semibold text-gray-700 mb-2">欢迎使用 MyAgent</h2>
                <p class="text-gray-500 text-sm max-w-md mx-auto">
                    智能多 Agent 任务执行平台，支持 ReAct 推理、工具调用、多模型路由。
                </p>
            </div>
        </div>

        <!-- Input Area -->
        <div class="border-t border-gray-200 bg-white px-4 py-4 flex-shrink-0">
            <form id="chat-form" class="flex gap-3 items-end max-w-3xl mx-auto">
                <div class="flex-1 relative">
                    <textarea
                        id="user-input"
                        rows="1"
                        placeholder="输入你的问题..."
                        class="w-full resize-none rounded-xl border border-gray-300 px-4 py-3 pr-12
                               text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent
                               placeholder-gray-400 transition-all"
                        style="max-height: 200px"
                    ></textarea>
                </div>
                <button
                    type="submit"
                    id="send-btn"
                    class="bg-primary-600 hover:bg-primary-700 text-white rounded-xl px-5 py-3
                           text-sm font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed
                           flex items-center gap-2 flex-shrink-0"
                >
                    <span>发送</span>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                    </svg>
                </button>
            </form>
            <div class="flex items-center justify-center gap-4 mt-2">
                <span id="token-usage" class="text-xs text-gray-400"></span>
                <!-- 深度思考切换 -->
                <button id="deep-think-btn"
                        title="开启后使用 Plan-and-Execute 引擎，将任务拆解为多步骤执行，适合复杂问题"
                        class="flex items-center gap-1.5 text-xs px-3 py-1.5 rounded-lg border transition-all
                               border-gray-200 text-gray-500 hover:border-violet-300 hover:text-violet-600 hover:bg-violet-50">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.346.346a1 1 0 01-.707.293H9.38a1 1 0 01-.707-.293l-.346-.346z"/>
                    </svg>
                    <span id="deep-think-text">深度思考</span>
                </button>
                <!-- 流式/非流式切换 -->
                <label class="stream-toggle-label" title="开启后逐字输出，关闭后等待完整响应">
                    <input type="checkbox" id="stream-toggle" checked>
                    <span class="stream-toggle-track">
                        <span class="stream-toggle-thumb"></span>
                    </span>
                    <span class="stream-toggle-text">
                        <span id="stream-mode-text">流式输出</span>
                    </span>
                </label>
            </div>
        </div>
    </main>

    <script src="/static/js/chat.js"></script>
</body>
</html>
